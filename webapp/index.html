<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Reflect — Communication Self-Reflection</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪞</text></svg>" />

    <!--
        Load third-party UMD libraries BEFORE SAPUI5 bootstrap.
        Temporarily hide any AMD define() so the UMD modules fall through
        to their global exports (window.marked, window.Chart).
    -->
    <script>
        if (typeof define !== "undefined") {
            window.__savedDefine = define;
            define = undefined;
        }
    </script>
    <script src="lib/marked.min.js"></script>
    <script src="lib/chart.min.js"></script>
    <script>
        if (window.__savedDefine) {
            define = window.__savedDefine;
            delete window.__savedDefine;
        }
    </script>

    <script
        id="sap-ui-bootstrap"
        src="https://sdk.openui5.org/1.132.0/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-libs="sap.m, sap.ui.core, sap.ui.layout, sap.f, sap.tnt, sap.ui.unified"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-onInit="module:sap/ui/core/ComponentSupport"
        data-sap-ui-resourceroots='{ "com.reflect.app": "./" }'
        data-sap-ui-excludeJQueryCompat="true"
    ></script>
</head>
<body class="sapUiBody" id="content">
    <div
        data-sap-ui-component
        data-name="com.reflect.app"
        data-id="container"
        data-settings='{ "id": "com.reflect.app" }'
        style="height: 100%"
    ></div>
</body>
</html>
