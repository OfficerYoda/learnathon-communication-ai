specVersion: "3.0"
metadata:
  name: reflect
type: application
framework:
  name: SAPUI5
  version: "1.132.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.f
    - name: sap.tnt
    - name: sap.ui.unified
builder:
  componentPreload:
    excludes:
      - "com/reflect/app/lib/**"
server:
  customMiddleware:
    - name: reflect-api-proxy
      afterMiddleware: compression
      configuration:
        baseUri: "http://localhost:6655/litellm/v1"
---
specVersion: "3.0"
kind: extension
type: server-middleware
metadata:
  name: reflect-api-proxy
middleware:
  path: lib/proxy-middleware.js
