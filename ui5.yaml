specVersion: "3.0"
metadata:
  name: reflect
type: application
framework:
  name: SAPUI5
  version: "1.132.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.f
    - name: sap.tnt
    - name: sap.ui.unified
builder:
  componentPreload:
    excludes:
      - "com/reflect/app/lib/**"
server:
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      mountPath: /api
      configuration:
        baseUri: "http://localhost:6655/litellm/v1"
