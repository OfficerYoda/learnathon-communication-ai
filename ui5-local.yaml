specVersion: "4.0"
metadata:
  name: com.reflect.app
type: application
framework:
  name: SAPUI5
  version: 1.132.0
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.f
    - name: sap.tnt
    - name: sap.ui.unified
    - name: sap.ui.comp
    - name: sap.ui.generic.app
    - name: sap.ui.table
    - name: sap.ushell
    - name: themelib_sap_bluecrystal
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: reflect-api-proxy
      afterMiddleware: compression
      configuration:
        baseUri: http://localhost:6655/litellm/v1
    - name: fiori-tools-proxy
      afterMiddleware: reflect-api-proxy
      configuration:
        ignoreCertErrors: false
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        component: com.reflect.app
        ui5Theme: sap_horizon
